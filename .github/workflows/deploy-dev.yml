name: Deploy dev

on:
  push:
    branches: [develop]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-dev]

concurrency:
  group: deploy-dev-contracts
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci && npm run lint && npm test && npm run build

  trigger-downstream:
    needs: verify
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        repo:
          - Dilipmukkapati1/portfolio-api
          - Dilipmukkapati1/portfolio-web
          - Dilipmukkapati1/portfolio-batch
    steps:
      - name: Trigger ${{ matrix.repo }} deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_PAT }}
          repository: ${{ matrix.repo }}
          event-type: deploy-dev
          client-payload: '{"ref":"${{ github.ref }}"}'
